<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="龍華珈琲 links: online shop, Instagram, and Google review."
    />
    <meta name="theme-color" content="#f8f5ee" />
    <meta property="og:title" content="龍華珈琲" />
    <meta
      property="og:description"
      content="鎌倉の余韻を、ご自宅でも。 Take a piece of Kamakura home."
    />
    <meta property="og:type" content="website" />
    <title>龍華珈琲 | Ryuge Coffee</title>
    <link rel="icon" href="./assets/ryuge-seal.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Sorts+Mill+Goudy:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color: #211a14;
        background: #f8f5ee;
        font-family: "Noto Serif JP", serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        color: #211a14;
        background:
          radial-gradient(circle at 50% 0%, rgba(112, 86, 55, 0.06), transparent 32rem),
          linear-gradient(180deg, #fbfaf6 0%, #f4efe6 100%);
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(33, 26, 20, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(33, 26, 20, 0.018) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 75%);
      }

      main {
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: 32px 18px;
      }

      .page {
        width: min(100%, 430px);
        padding: 12px 0 16px;
        text-align: center;
      }

      .seal {
        display: block;
        width: clamp(132px, 42vw, 176px);
        height: auto;
        margin: 0 auto 22px;
        mix-blend-mode: multiply;
        opacity: 0.94;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.25rem, 13vw, 3.35rem);
        font-weight: 500;
        letter-spacing: 0.16em;
        line-height: 1.08;
      }

      .subhead {
        margin: 10px 0 0;
        color: #6b5542;
        font-family: "Sorts Mill Goudy", "Noto Serif JP", serif;
        font-size: 0.98rem;
        letter-spacing: 0.08em;
      }

      .lead {
        margin: 28px auto 0;
        color: #4a392b;
        font-size: 1.02rem;
        font-weight: 500;
        line-height: 1.9;
      }

      .lead span {
        display: block;
        margin-top: 2px;
        font-family: "Sorts Mill Goudy", "Noto Serif JP", serif;
        font-size: 1rem;
        font-style: italic;
        color: #6b5542;
      }

      .links {
        display: grid;
        gap: 14px;
        margin: 42px 0 40px;
      }

      .button {
        display: flex;
        min-height: 58px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(50, 34, 22, 0.38);
        color: #211a14;
        background: rgba(255, 253, 248, 0.74);
        box-shadow: 0 10px 28px rgba(57, 39, 24, 0.07);
        font-family: "Sorts Mill Goudy", "Noto Serif JP", serif;
        font-size: 1.06rem;
        letter-spacing: 0.04em;
        text-decoration: none;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .button:hover,
      .button:focus-visible {
        border-color: rgba(50, 34, 22, 0.72);
        background: rgba(255, 253, 248, 0.95);
        box-shadow: 0 12px 34px rgba(57, 39, 24, 0.1);
        transform: translateY(-1px);
      }

      .button:focus-visible {
        outline: 2px solid #8a6a49;
        outline-offset: 4px;
      }

      footer {
        color: #6b5542;
        font-size: 0.82rem;
        line-height: 1.75;
      }

      footer p {
        margin: 0;
      }

      @media (max-width: 360px) {
        main {
          padding-inline: 14px;
        }

        .seal {
          width: 126px;
        }

        .lead {
          font-size: 0.96rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="page" aria-label="龍華珈琲 links">
        <img class="seal" src="./assets/ryuge-seal.png" alt="龍華珈琲" />

        <h1>龍華珈琲</h1>
        <p class="subhead">Ryuge Coffee</p>

        <p class="lead">
          鎌倉の余韻を、ご自宅でも。
          <span>Take a piece of Kamakura home.</span>
        </p>

        <nav class="links" aria-label="Primary links">
          <a class="button" href="https://www.ryuge.biz">Online Shop</a>
          <a
            class="button"
            href="https://www.instagram.com/ryuge_coffee/"
            rel="me"
            >Instagram</a
          >
          <a
            class="button"
            href="https://g.page/r/CdPPvYlcn7PqEBM/review"
            >Google Review</a
          >
        </nav>

        <footer>
          <p>Quietly crafted in Kamakura</p>
          <p>@ryuge_coffee</p>
        </footer>
      </section>
    </main>
  </body>
</html>
